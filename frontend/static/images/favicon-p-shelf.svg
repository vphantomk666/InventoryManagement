<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0f172a"/>

  <!-- Subtle top glow -->
  <ellipse cx="16" cy="4" rx="12" ry="5" fill="#38bdf8" opacity="0.08"/>

  <!-- Left vertical support bar -->
  <rect x="5" y="5" width="2.5" height="20" rx="1" fill="#38bdf8" opacity="0.25"/>
  <!-- Right vertical support bar -->
  <rect x="24.5" y="5" width="2.5" height="20" rx="1" fill="#38bdf8" opacity="0.25"/>

  <!-- Shelf line 1 (top) -->
  <rect x="5" y="5" width="22" height="2" rx="1" fill="#38bdf8" opacity="0.3"/>

  <!-- Shelf line 2 (middle) -->
  <rect x="5" y="16" width="22" height="2" rx="1" fill="#38bdf8" opacity="0.3"/>

  <!-- Shelf line 3 (bottom) -->
  <rect x="5" y="24.5" width="22" height="2.5" rx="1.2" fill="#38bdf8" opacity="0.9"/>
  <!-- Bottom shelf bright highlight -->
  <rect x="5" y="24.5" width="22" height="1" rx="0.5" fill="white" opacity="0.4"/>

  <!-- The P letter -->
  <text
    x="16"
    y="22.5"
    text-anchor="middle"
    font-family="Arial Black, Arial, sans-serif"
    font-size="18"
    font-weight="900"
    fill="#38bdf8"
    letter-spacing="-0.5"
  >P</text>

  <!-- Small inventory boxes on top shelf -->
  <rect x="7" y="7.5" width="4" height="3.5" rx="0.8" fill="#38bdf8" opacity="0.4"/>
  <rect x="12.5" y="7.5" width="3" height="3.5" rx="0.8" fill="#38bdf8" opacity="0.25"/>
  <rect x="17" y="7.5" width="5" height="3.5" rx="0.8" fill="#38bdf8" opacity="0.35"/>
</svg>