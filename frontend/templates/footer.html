<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Footer Modal Fix</title>

<style>
/* ===== MODAL STYLE ===== */
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
}

.modal.active {
    display: flex;
    align-items: center;
    justify-content: center;
}

.modal-content {
    background: white;
    padding: 20px;
    border-radius: 10px;
    width: 300px;
    text-align: center;
}

.close-btn {
    cursor: pointer;
    float: right;
    font-size: 18px;
}

/* ===== FOOTER ===== */
footer {
    margin-top: 50px;
    padding: 20px;
    background: #222;
    color: white;
    text-align: center;
}

.footer-links a {
    color: #ccc;
    margin: 0 10px;
    text-decoration: none;
}

.footer-links a:hover {
    color: white;
}
</style>
</head>

<body>

<!-- ===== FOOTER ===== -->
<footer>
    <div class="footer-content">
        <div class="footer-links">
            <a href="#" id="aboutLink">About Us</a>
            <a href="#" id="termsLink">Terms of Service</a>
            <a href="#" id="privacyLink">Privacy Policy</a>
        </div>
        <p>&copy; 2026 Product Manager. All rights reserved.</p>
    </div>
</footer>

<!-- ===== MODALS ===== -->

<div id="aboutModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal('aboutModal')">❌</span>
        <h2>About Us</h2>
        <p>This is About Us content.</p>
    </div>
</div>

<div id="termsModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal('termsModal')">❌</span>
        <h2>Terms of Service</h2>
        <p>Terms content here.</p>
    </div>
</div>

<div id="privacyModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal('privacyModal')">❌</span>
        <h2>Privacy Policy</h2>
        <p>Privacy policy here.</p>
    </div>
</div>

<!-- ===== JAVASCRIPT ===== -->
<script>
document.addEventListener("DOMContentLoaded", function() {

    // Open modal
    document.getElementById("aboutLink").addEventListener("click", function(e) {
        e.preventDefault();
        openModal("aboutModal");
    });

    document.getElementById("termsLink").addEventListener("click", function(e) {
        e.preventDefault();
        openModal("termsModal");
    });

    document.getElementById("privacyLink").addEventListener("click", function(e) {
        e.preventDefault();
        openModal("privacyModal");
    });

    // Close modal when clicking outside
    ["aboutModal", "termsModal", "privacyModal"].forEach(id => {
        const modal = document.getElementById(id);
        modal.addEventListener("click", function(e) {
            if (e.target === modal) {
                closeModal(id);
            }
        });
    });

});

// Functions
function openModal(id) {
    document.getElementById(id).classList.add("active");
}

function closeModal(id) {
    document.getElementById(id).classList.remove("active");
}
</script>

</body>
</html>
