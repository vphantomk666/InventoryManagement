<style>
footer {
  background: var(--bg-secondary);
  border-top: 1px solid var(--border-color);
  padding: 2rem 0;
  margin-top: 3rem;
}
.footer-content {
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 2rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 1rem;
}
.footer-links {
  display: flex;
  gap: 2rem;
  flex-wrap: wrap;
}
.footer-links a {
  color: var(--text-secondary);
  text-decoration: none;
  font-size: 0.9rem;
  transition: color 0.3s ease;
  cursor: pointer;
}
.footer-links a:hover {
  color: var(--accent-primary);
}
.footer-copyright {
  color: var(--text-secondary);
  font-size: 0.85rem;
}
</style>
<footer>
    <div class="footer-content">
        <div class="footer-links">
            <a href="#" onclick="showAboutUs(); return false;">About Us</a>
            <a href="#" onclick="showTerms(); return false;">Terms of Service</a>
            <a href="#" onclick="showPrivacy(); return false;">Privacy Policy</a>
        </div>
        <p class="footer-copyright">&copy; 2026 Product Manager. All rights reserved.</p>
    </div>
</footer>
<script>
function showAboutUs() { document.getElementById("aboutModal").classList.add("active"); }
function closeAboutUs() { document.getElementById("aboutModal").classList.remove("active"); }
function showTerms() { document.getElementById("termsModal").classList.add("active"); }
function closeTerms() { document.getElementById("termsModal").classList.remove("active"); }
function showPrivacy() { document.getElementById("privacyModal").classList.add("active"); }
function closePrivacy() { document.getElementById("privacyModal").classList.remove("active"); }
document.getElementById("aboutModal").addEventListener("click", (e) => { if (e.target.id === "aboutModal") closeAboutUs(); });
document.getElementById("termsModal").addEventListener("click", (e) => { if (e.target.id === "termsModal") closeTerms(); });
document.getElementById("privacyModal").addEventListener("click", (e) => { if (e.target.id === "privacyModal") closePrivacy(); });
</script>
